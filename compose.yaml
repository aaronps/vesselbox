networks:
  default:
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  registry:
  dev:
  debian128:
  debian133:
  ubuntu2204:
  ubuntu2404:
  rockylinux97:
  rockylinux101:
  almalinux101:

services:

  registry:
    image: ghcr.io/project-zot/zot:v2.1.15

    volumes:
      - type: volume
        source: registry
        target: /var/lib/registry

    ports:
      - 5000:5000

    logging:
      driver: local

  dev:
    hostname: dev
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    profiles:
      - disabled

    environment:
      - SRC_TYPE=image
      # - SRC=/images/ubuntu22.04.docker.tar
      - SRC=/images/ubuntu24.04.docker.tar

    ports:
      - 20021:22

    volumes:
      - type: volume
        source: dev
        target: /data
      - type: bind
        source: ./scripts/entrypoint.sh
        target: /usr/local/sbin/entrypoint.sh
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts/init-volume.sh
        target: /usr/local/sbin/init-volume.sh
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./dist
        target: /images
        read_only: true
        bind:
          create_host_path: false

  ubuntu2204:
    hostname: ubuntu2204
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    profiles:
      - disabled

    environment:
      - SRC_REGISTRY_INSECURE=--insecure
      - SRC_TYPE=registry
      - SRC=registry:5000/vesselbox/ubuntu:22.04

    ports:
      - 20022:22

    volumes:
      - type: volume
        source: ubuntu2204
        target: /data

  ubuntu2404:
    hostname: ubuntu2404
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    profiles:
      - disabled

    environment:
      - SRC_REGISTRY_INSECURE=--insecure
      - SRC_TYPE=registry
      - SRC=registry:5000/vesselbox/ubuntu:24.04

    ports:
      - 20023:22

    volumes:
      - type: volume
        source: ubuntu2404
        target: /data

  debian133:
    hostname: debian133
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    # profiles:
    #   - disabled

    environment:
      - SRC_REGISTRY_INSECURE=--insecure
      - SRC_TYPE=registry
      - SRC=registry:5000/vesselbox/debian:13.3

    ports:
      - 20024:22

    volumes:
      - type: volume
        source: debian133
        target: /data

  debian128:
    hostname: debian128
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    # profiles:
    #   - disabled

    environment:
      - SRC_REGISTRY_INSECURE=--insecure
      - SRC_TYPE=registry
      - SRC=registry:5000/vesselbox/debian:12.8

    ports:
      - 20025:22

    volumes:
      - type: volume
        source: debian128
        target: /data
        
  rockylinux97:
    hostname: rockylinux97
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    environment:
      - SRC_REGISTRY_INSECURE=--insecure
      - SRC_TYPE=registry
      - SRC=registry:5000/vesselbox/rockylinux:9.7
    
    ports:
      - 20026:22

    volumes:
      - type: volume
        source: rockylinux97
