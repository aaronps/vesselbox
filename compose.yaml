networks:
  default:
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  registry:
  debian128:
  debian133:
  ubuntu2204:
  ubuntu2404:
  rockylinux101:

services:

  registry:
    image: ghcr.io/project-zot/zot:v2.1.15

    volumes:
      - type: volume
        source: registry
        target: /var/lib/registry

    ports:
      - 5000:5000

    logging:
      driver: local

  init-ubuntu2204:
    hostname: ubuntu2204
    image: vesselbox/vesselbox

    profiles:
      - job

    entrypoint: init-volume.sh

    volumes:
      - type: volume
        source: ubuntu2204
        target: /data
      - type: bind
        source: ../dist/ubuntu22.04.docker.tar
        target: /base.tar
        read_only: true
        bind:
          create_host_path: false

  ubuntu2204:
    hostname: ubuntu2204
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    # profiles:
    #   - disabled

    ports:
      - 20023:22

    volumes:
      - type: volume
        source: ubuntu2204
        target: /data
        
  init-ubuntu2404:
    hostname: ubuntu2404
    image: vesselbox/vesselbox

    profiles:
      - job

    entrypoint: init-volume.sh

    volumes:
      - type: volume
        source: ubuntu2404
        target: /data
      - type: bind
        source: ../dist/ubuntu24.04.docker.tar
        target: /base.tar
        read_only: true
        bind:
          create_host_path: false

  ubuntu2404:
    hostname: ubuntu2404
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    profiles:
      - disabled

    ports:
      - 20022:22

    volumes:
      - type: volume
        source: ubuntu2404
        target: /data
        
  init-debian133:
    hostname: debian133
    image: vesselbox/vesselbox

    profiles:
      - job

    entrypoint: init-volume.sh

    volumes:
      - type: volume
        source: debian133
        target: /data
      - type: bind
        source: ../dist/debian13.3.docker.tar
        target: /base.tar
        read_only: true
        bind:
          create_host_path: false

  debian133:
    hostname: debian133
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    # profiles:
    #   - disabled

    ports:
      - 20024:22

    volumes:
      - type: volume
        source: debian133
        target: /data
        
  init-debian128:
    hostname: debian128
    image: vesselbox/vesselbox

    profiles:
      - job

    entrypoint: init-volume.sh

    volumes:
      - type: volume
        source: debian128
        target: /data
      - type: bind
        source: ../dist/debian12.8.docker.tar
        target: /base.tar
        read_only: true
        bind:
          create_host_path: false

  debian128:
    hostname: debian128
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN

    # profiles:
    #   - disabled

    ports:
      - 20025:22

    volumes:
      - type: volume
        source: debian128
        target: /data
        
  rockylinux101:
    hostname: rockylinux101
    image: vesselbox/vesselbox

    cap_add:
      - SYS_ADMIN
    
    ports:
      - 20026:22

    volumes:
      - type: volume
        source: rockylinux101
        target: /data

        